<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>營養評估表</title>
<style>
  :root {
    --green-dark: #2e7d32;
    --green-mid: #66bb6a;
    --green-light: #e8f5e9;
    --green-band: #dcedc8;
    --gray-cell: #9e9e9e;
    --hit-cell: #66bb6a;
    --warn: #e53935;
    --border: #bdbdbd;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", sans-serif;
    background: linear-gradient(160deg, #f1f8e9, #ffffff 40%, #f1f8e9);
    color: #263238;
    padding: 16px;
  }
  .container { max-width: 1200px; margin: 0 auto; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 12px; margin-bottom: 12px;
  }
  h1 {
    font-size: 2rem; color: var(--green-dark); letter-spacing: 6px;
    text-shadow: 1px 1px 0 #c5e1a5;
  }
  .meta { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .meta label { font-size: .9rem; color: #455a64; }
  .meta label.required::after {
    content: " *";
    color: var(--warn);
    font-weight: 700;
  }
  .meta input {
    border: none; border-bottom: 1.5px solid var(--green-mid);
    background: transparent; padding: 4px 6px; font-size: .95rem; outline: none;
  }
  .meta input:focus { border-bottom-color: var(--green-dark); }
  .meta input.invalid { border-bottom-color: var(--warn); }
  .meta input:disabled {
    color: #607d8b;
    cursor: not-allowed;
  }

  .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .toolbar button {
    border: 1px solid var(--green-mid); background: #fff; color: var(--green-dark);
    padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: .9rem;
  }
  .toolbar button:hover { background: var(--green-light); }
  .toolbar button.active { background: var(--green-dark); color: #fff; border-color: var(--green-dark); }
  .toolbar button:disabled {
    background: #eceff1;
    border-color: #cfd8dc;
    color: #90a4ae;
    cursor: not-allowed;
    opacity: 1;
  }
  .hint { font-size: .8rem; color: #78909c; align-self: center; }
  .submit-status {
    font-size: .82rem;
    color: #546e7a;
    align-self: center;
    min-height: 1.2em;
  }
  .submit-status.success { color: var(--green-dark); }
  .submit-status.error { color: var(--warn); }
  .api-panel {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid #dce5dc;
  }
  .api-panel h3 {
    font-size: 1rem;
    color: var(--green-dark);
    margin-bottom: 10px;
  }
  .api-actions {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    flex-wrap: wrap;
  }
  .api-actions label {
    color: #455a64;
    flex: 1 1 260px;
    font-size: .9rem;
  }
  .api-actions input {
    width: 100%;
    border: 1px solid #cfd8dc;
    border-radius: 6px;
    font-size: .9rem;
    margin-top: 4px;
    outline: none;
    padding: 8px 10px;
  }
  .api-actions input:focus {
    border-color: var(--green-dark);
    box-shadow: 0 0 0 3px rgba(46, 125, 50, .12);
  }
  .api-actions button {
    border: 1px solid var(--green-mid);
    background: #fff;
    color: var(--green-dark);
    border-radius: 6px;
    cursor: pointer;
    font-size: .9rem;
    min-height: 36px;
    padding: 8px 14px;
  }
  .api-actions button:hover { background: var(--green-light); }
  .api-actions button:disabled {
    background: #eceff1;
    border-color: #cfd8dc;
    color: #90a4ae;
    cursor: not-allowed;
    opacity: 1;
  }
  .record-output {
    margin-top: 12px;
    display: grid;
    gap: 8px;
  }
  .record-meta {
    color: #455a64;
    display: grid;
    gap: 4px;
    font-size: .88rem;
  }
  .record-meta b { color: #263238; }
  .record-list {
    display: grid;
    gap: 8px;
  }
  .record-list button {
    background: #fff;
    border: 1px solid #cfd8dc;
    border-radius: 6px;
    color: #263238;
    cursor: pointer;
    display: grid;
    gap: 3px;
    padding: 9px 10px;
    text-align: left;
  }
  .record-list button:hover {
    border-color: var(--green-dark);
    background: var(--green-light);
  }
  .record-list small {
    color: #607d8b;
    font-size: .78rem;
  }

  .table-wrap { overflow-x: auto; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
  table { border-collapse: collapse; width: 100%; min-width: 980px; }
  th, td { border: 1px solid var(--border); font-size: .85rem; }

  thead th {
    background: var(--green-dark); color: #fff; padding: 6px 4px;
    position: sticky; top: 0; z-index: 2; font-weight: 600;
  }
  thead th.q-col { min-width: 340px; text-align: left; padding-left: 10px; }
  thead th.yes-col { min-width: 48px; }
  thead th.supp { min-width: 52px; font-size: .78rem; line-height: 1.25; }

  tbody td.q-cell { text-align: left; padding: 5px 10px; }
  tbody tr:nth-child(even) { background: #fafafa; }
  tbody tr.checked-row { background: var(--green-light); }
  tbody td.yes-cell { text-align: center; }
  tbody td.yes-cell input { width: 17px; height: 17px; accent-color: var(--green-dark); cursor: pointer; }

  td.grid-cell { height: 26px; text-align: center; }
  td.grid-cell.mapped { background: #cfd8dc; }
  td.grid-cell.mapped.hit { background: var(--hit-cell); }

  tfoot td { font-weight: 700; padding: 8px 4px; background: var(--green-band); text-align: center; }
  tfoot td.total-label { text-align: right; padding-right: 12px; color: var(--green-dark); }
  tfoot td.col-total.over { background: var(--warn); color: #fff; }
  tfoot tr.submit-row td {
    background: #fff;
    font-weight: 400;
    padding: 10px 12px;
    text-align: right;
  }
  .submit-area {
    align-items: center;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: flex-end;
  }
  .table-submit {
    border: 1px solid var(--green-mid);
    background: var(--green-dark);
    color: #fff;
    border-radius: 6px;
    cursor: pointer;
    font-size: .9rem;
    min-height: 36px;
    padding: 8px 16px;
  }
  .table-submit:hover { background: #1b5e20; }
  .table-submit:disabled { opacity: .65; cursor: wait; }
  .new-assessment {
    border: 1px solid var(--green-dark);
    background: #fff;
    color: var(--green-dark);
    border-radius: 6px;
    cursor: pointer;
    font-size: .9rem;
    min-height: 36px;
    padding: 8px 16px;
  }
  .new-assessment:hover { background: var(--green-light); }
  .hidden { display: none !important; }

  .result {
    margin-top: 16px; background: #fff; border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,.08); padding: 16px;
  }
  .result h2 { font-size: 1.1rem; color: var(--green-dark); margin-bottom: 8px; }
  .result p.note { font-size: .85rem; color: #78909c; margin-bottom: 10px; }
  .badges { display: flex; flex-wrap: wrap; gap: 8px; }
  .badge {
    padding: 6px 14px; border-radius: 20px; font-size: .9rem;
    background: var(--green-light); color: var(--green-dark); border: 1px solid var(--green-mid);
  }
  .badge.over { background: var(--warn); color: #fff; border-color: var(--warn); font-weight: 700; }
  .empty { color: #90a4ae; font-size: .9rem; }

  footer { margin-top: 14px; font-size: .8rem; color: #78909c; text-align: center; }

  @media print {
    .toolbar, .hint, .submit-row { display: none; }
    body { background: #fff; padding: 0; }
    .table-wrap, .result { box-shadow: none; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>營養評估表</h1>
    <div class="meta">
      <label class="required">姓名：<input type="text" id="name" size="8" required></label>
      <label class="required">年齡：<input type="text" id="age" size="4" required></label>
      <label>填表日期：<input type="date" id="date"></label>
    </div>
  </header>

  <div class="toolbar">
    <button id="btn-reset-answers" type="button">🧹 清除勾選</button>
    <button type="button" onclick="window.print()">🖨 列印</button>
    <button id="btn-save-pdf" type="button">📄 存成 PDF</button>
    <button class="new-assessment hidden" id="btn-new-assessment" type="button">再寫一張</button>
    <span class="hint" id="edit-hint">勾選左側「是」即自動計分。</span>
  </div>

  <div class="table-wrap">
    <table id="assessment">
      <thead>
        <tr>
          <th class="q-col">評估項目</th>
          <th class="yes-col">是</th>
        </tr>
      </thead>
      <tbody></tbody>
      <tfoot>
        <tr>
          <td class="total-label" colspan="2">總計（單項超過 7 建議加重補充）</td>
        </tr>
        <tr class="submit-row">
          <td id="submit-cell" colspan="14">
            <div class="submit-area">
              <span class="submit-status" id="submit-status" aria-live="polite"></span>
              <button class="table-submit" id="btn-submit" type="button">📤 送出資料</button>
            </div>
          </td>
        </tr>
      </tfoot>
    </table>
  </div>

  <div class="result">
    <h2>建議補充</h2>
    <p class="note">若單項營養數值超過七以上，建議加重補充。均衡的營養、適量的補充、運動是維持健康的不二法門。</p>
    <div class="badges" id="badges"><span class="empty">尚未勾選任何項目</span></div>
    <div class="api-panel">
      <h3>紀錄</h3>
      <div class="api-actions">
        <label>紀錄 ID
          <input type="text" id="record-id" autocomplete="off" placeholder="送出後自動帶入">
        </label>
        <button id="btn-fetch" type="button">🔎 查詢</button>
        <button id="btn-share" type="button" disabled>分享網址</button>
        <label>姓名
          <input type="text" id="search-name" autocomplete="off" placeholder="輸入姓名查詢">
        </label>
        <button id="btn-search-name" type="button">查姓名</button>
      </div>
      <div class="record-output" id="record-output" aria-live="polite">
        <span class="empty">尚無紀錄</span>
      </div>
    </div>
  </div>

  <footer>2021 年製 · 本頁面僅供自我檢視參考，不能取代專業醫療診斷。</footer>
</div>

<script>
const SUPPLEMENTS = [
  "優質蛋白素", "維生素A", "維生素B", "維生素C", "維生素E",
  "卵磷脂", "纖維", "鈣鎂D", "益生菌", "大蒜片", "魚油", "綜合營養片"
];

// 每題文字 + 預設灰階不計分欄位（索引對應 SUPPLEMENTS）
const QUESTIONS = [
  { text: "01. 您每天吃蔬菜、水果少於兩次", map: [0, 4, 5, 9, 10] },
  { text: "02. 您經常三餐不足 或 不定時用餐", map: [] },
  { text: "03. 您常吃速食、零食、泡麵等食物（三餐）", map: [1, 4, 5, 7, 9] },
  { text: "04. 您經常沒有吃早餐（或是早午餐當一餐）", map: [0, 2, 11] },
  { text: "05. 您經常吃油炸食物 或 經常吃宵夜", map: [1, 7] },
  { text: "06. 您經常喝酒（應酬）抽菸 或 嚼檳榔的習慣", map: [6] },
  { text: "07. 您沒有每天喝牛奶或羊奶", map: [1, 3, 4, 5, 6, 8, 9,] },
  { text: "08. 您現在是長期吃素（蛋奶、全素者）", map: [1, 3, 4, 6, 9,10] },
  { text: "09. 您經常節食以減輕體重", map: [] },
  { text: "10. 您經常打針、吃藥（含中、西藥及補品）", map: [1, 5, 6, 7, 9] },
  { text: "11. 您經常熬夜導致睡眠少於6小時 或 早上起不來", map: [7, 8] },
  { text: "12. 您常常感覺到倦怠或精神不濟", map: [1, 5, 6, 9] },
  { text: "13. 您經常感冒", map: [4, 5, 6, 7, 10] },
  { text: "14. 您很容易緊張 或 工作壓力大", map: [4, 5, 6, 8, 9] },
  { text: "15. 您沒有每天定時排便 或 排便不順暢", map: [1, 4, 5, 9, 10] },
  { text: "16. 您的排便顏色經常是黑色 或 深褐色", map: [6, 7, 8, 10, 11] },
  { text: "17. 您經常胃酸過多（胃脹氣）或胃痛（胃食道逆流）", map: [1, 2, 4, 5, 10] },
  { text: "18. 您經常腹瀉 或 消化不良", map: [5, 6, 7, 10, 11] },
  { text: "19. 您頭皮屑過多、經常頭皮癢", map: [3, 4, 5, 6, 8, 9, 10] },
  { text: "20. 您的鼻子 或 皮膚有過敏的現象（氣喘）", map: [7] },
  { text: "21. 您常乾咳", map: [6, 7, 8, 10] },
  { text: "22. 您經常對某些食物 或 保養品有過敏的現象", map: [7, 10] },
  { text: "23. 您經常口乾舌燥、嘴唇乾裂 或 嘴角破裂", map: [0, 1, 5, 6, 7, 8, 9, 10, 11] },
  { text: "24. 您在夜間視覺常覺得較差 或 怕光", map: [2, 5, 6, 8, 10] },
  { text: "25. 您的眼睛常常感覺疲勞、乾澀或刺痛", map: [5, 6, 7, 8, 9, 11] },
  { text: "26. 您容易暈車 或 暈船", map: [1, 3, 4, 5, 6, 7, 8, 10, 11] },
  { text: "27. 您的背上有很多痘痘", map: [0, 7, 9] },
  { text: "28. 您有黑斑、雀斑、或 身體有不明的斑點", map: [7, 9, 10] },
  { text: "29. 您有青春痘或粉刺", map: [7, 8, 9, 10] },
  { text: "30. 您常有抽筋的現象（手、腳）", map: [0, 1, 2, 3, 4, 5, 7, 8, 9, 10] },
  { text: "31. 您常有筋骨痠痛的現象", map: [1, 2, 4, 5, 6, 8, 9, 10] },
  { text: "32. 您的生理期會感到疼痛（下腹部）", map: [0, 1, 3, 6] },
  { text: "33. 您經常頭痛", map: [0, 2, 6, 8, 9] },
  { text: "34. 您容易失眠 或 睡不著（多夢、易醒）", map: [0, 1, 5, 6, 8, 10] },
  { text: "35. 您經常情緒不佳、暴躁、沮喪 或 憂鬱", map: [0, 1, 4, 5, 6, 8, 9, 10] },
  { text: "36. 您的頭髮枯黃、易分岔斷裂", map: [1, 4, 6, 7, 8, 9, 10] },
  { text: "37. 您的指甲有白斑、條紋 或 容易斷裂", map: [2, 5, 6, 7, 8, 9, 10] },
  { text: "38. 您有貧血現象（易暈眩、體力差）", map: [1, 5, 6, 8, 9, 10] },
  { text: "39. 您平常容易手腳冰冷", map: [1, 6, 8, 9] },
  { text: "40. 您很容易健忘 或 集中力有衰退現象", map: [0, 1, 2, 3, 4, 6, 8, 9] },
  { text: "41. 您的傷口不易癒合（大、小傷口）", map: [2, 5, 6, 7, 8, 9, 10] },
  { text: "42. 您牙齦容易出血 或 身上容易瘀血", map: [1, 4, 5, 6, 8, 9, 10] },
  { text: "43. 您的體重有過重的現象", map: [1, 2, 4, 9] },
  { text: "44. 您的血壓偏高 或 血脂肪過高", map: [1, 11] },
  { text: "45. 您的尿酸過高 或 有痛風現象", map: [0, 5, 6, 8, 10] },
  { text: "46. 您的血糖過高 或 有糖尿病症狀", map: [8] },
  { text: "47. 您現在已經懷孕或在哺乳", map: [] }
];

// const API_BASE_URL = (window.NUTRITION_API_BASE_URL || "http://localhost:8080").replace(/\/$/, "");
const API_BASE_URL = (window.NUTRITION_API_BASE_URL || "https://nutritional-assessment-api.onrender.com").replace(/\/$/, "");
const API_ENDPOINT = window.NUTRITION_API_ENDPOINT || `${API_BASE_URL}/api/assessments`;
const DEFAULT_MAPPING = QUESTIONS.map(q => q.map.slice());

let mapping = DEFAULT_MAPPING.map(m => m.slice());
let answers = QUESTIONS.map(() => false);
let assessmentLocked = false;

function isScoredCell(qi, si) {
  return !mapping[qi].includes(si);
}

function calculateTotals() {
  return SUPPLEMENTS.map((_, si) =>
    QUESTIONS.reduce((sum, _, qi) => sum + (answers[qi] && isScoredCell(qi, si) ? 1 : 0), 0)
  );
}

function buildPayload() {
  const totals = calculateTotals();
  const ageValue = document.getElementById("age").value.trim();
  const parsedAge = Number(ageValue);

  return {
    respondent: {
      name: document.getElementById("name").value.trim(),
      age: ageValue === "" ? null : (Number.isFinite(parsedAge) ? parsedAge : ageValue),
      date: document.getElementById("date").value
    },
    answers: QUESTIONS.map((q, qi) => ({
      questionId: qi + 1,
      questionText: q.text,
      checked: answers[qi],
      mappedSupplements: SUPPLEMENTS.filter((_, si) => isScoredCell(qi, si))
    })),
    totals: SUPPLEMENTS.map((name, si) => ({
      supplement: name,
      score: totals[si],
      needsExtraSupplement: totals[si] > 7
    })),
    recommendations: SUPPLEMENTS
      .map((name, si) => ({ supplement: name, score: totals[si] }))
      .filter(item => item.score > 7),
    submittedAt: new Date().toISOString()
  };
}

function setSubmitStatus(message, type = "") {
  const status = document.getElementById("submit-status");
  status.textContent = message;
  status.className = "submit-status" + (type ? ` ${type}` : "");
}

function getPdfFilenamePart(value, fallback) {
  const text = String(value || "").trim() || fallback;
  return text.replace(/[\\/:*?"<>|]/g, "-");
}

function getPdfTitle() {
  const name = getPdfFilenamePart(document.getElementById("name").value, "未填姓名");
  const date = getPdfFilenamePart(document.getElementById("date").value, new Date().toISOString().slice(0, 10));
  const recordId = getPdfFilenamePart(document.getElementById("record-id").value, "");
  return ["營養評估表", name, date, recordId].filter(Boolean).join("_");
}

function getRecordMetaText(label) {
  const rows = document.querySelectorAll("#record-output .record-meta div");
  for (const row of rows) {
    const text = row.textContent.trim();
    const prefix = `${label}：`;
    if (text.startsWith(prefix)) return text.slice(prefix.length).trim();
  }
  return "";
}

function drawWrappedText(ctx, text, x, y, maxWidth, lineHeight, maxLines = 2) {
  const chars = Array.from(String(text || ""));
  const lines = [];
  let line = "";

  chars.forEach(char => {
    const next = line + char;
    if (line && ctx.measureText(next).width > maxWidth) {
      lines.push(line);
      line = char;
    } else {
      line = next;
    }
  });
  if (line) lines.push(line);

  const visibleLines = lines.slice(0, maxLines);
  if (lines.length > maxLines) {
    let lastLine = visibleLines[visibleLines.length - 1] || "";
    while (lastLine && ctx.measureText(`${lastLine}...`).width > maxWidth) {
      lastLine = lastLine.slice(0, -1);
    }
    visibleLines[visibleLines.length - 1] = `${lastLine}...`;
  }

  visibleLines.forEach((lineText, index) => {
    ctx.fillText(lineText, x, y + index * lineHeight);
  });
}

function drawCenteredText(ctx, text, x, y, width, height) {
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(text, x + width / 2, y + height / 2);
  ctx.textAlign = "left";
  ctx.textBaseline = "alphabetic";
}

function drawCell(ctx, x, y, width, height, fillStyle, strokeStyle = "#bdbdbd") {
  ctx.fillStyle = fillStyle;
  ctx.fillRect(x, y, width, height);
  ctx.strokeStyle = strokeStyle;
  ctx.lineWidth = 2;
  ctx.strokeRect(x, y, width, height);
}

function drawCheckBox(ctx, x, y, checked) {
  const size = 28;
  const boxX = x + 26;
  const boxY = y + 13;

  ctx.strokeStyle = checked ? "#2e7d32" : "#9e9e9e";
  ctx.lineWidth = 4;
  ctx.strokeRect(boxX, boxY, size, size);

  if (!checked) return;

  ctx.fillStyle = "#2e7d32";
  ctx.fillRect(boxX, boxY, size, size);
  ctx.strokeStyle = "#ffffff";
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(boxX + 7, boxY + 15);
  ctx.lineTo(boxX + 13, boxY + 22);
  ctx.lineTo(boxX + 22, boxY + 7);
  ctx.stroke();
}

function drawPdfHeader(ctx, width, padding, tableWidth) {
  const name = document.getElementById("name").value.trim() || "未填";
  const age = document.getElementById("age").value.trim() || "未填";
  const date = document.getElementById("date").value || "未填";
  const recordId = document.getElementById("record-id").value.trim();
  const createdAt = getRecordMetaText("建立時間");
  const metaRows = [
    ["姓名", name],
    ["年齡", age],
    ["填表日期", date]
  ];
  if (recordId) metaRows.push(["紀錄 ID", recordId]);
  if (createdAt) metaRows.push(["建立時間", createdAt]);

  ctx.fillStyle = "#2e7d32";
  ctx.font = '700 48px "PingFang TC", "Microsoft JhengHei", sans-serif';
  ctx.fillText("營養評估表", padding, padding + 48);

  ctx.fillStyle = "#455a64";
  ctx.font = '24px "PingFang TC", "Microsoft JhengHei", sans-serif';
  metaRows.forEach(([label, value], index) => {
    const column = index % 2;
    const row = Math.floor(index / 2);
    const x = padding + column * (tableWidth / 2);
    const y = padding + 92 + row * 34;
    ctx.fillText(`${label}：${value}`, x, y);
  });

  return padding + 112 + Math.ceil(metaRows.length / 2) * 34;
}

function createAssessmentPdfCanvas() {
  const colors = {
    greenDark: "#2e7d32",
    greenLight: "#e8f5e9",
    greenBand: "#dcedc8",
    hit: "#66bb6a",
    gray: "#cfd8dc",
    border: "#bdbdbd",
    text: "#263238",
    white: "#ffffff",
    warn: "#e53935"
  };
  const padding = 36;
  const questionWidth = 650;
  const yesWidth = 80;
  const supplementWidth = 96;
  const headerHeight = 78;
  const rowHeight = 56;
  const totalHeight = 60;
  const tableWidth = questionWidth + yesWidth + supplementWidth * SUPPLEMENTS.length;
  const width = tableWidth + padding * 2;
  const totals = calculateTotals();
  const activeTotals = totals
    .map((score, index) => ({ name: SUPPLEMENTS[index], score }))
    .filter(item => item.score > 0)
    .sort((a, b) => b.score - a.score);
  const recommendationRows = Math.max(1, Math.ceil(activeTotals.length / 4));
  const recommendationHeight = 92 + recommendationRows * 48;
  const tableHeight = headerHeight + QUESTIONS.length * rowHeight + totalHeight;
  const canvas = document.createElement("canvas");
  const preliminaryCanvas = document.createElement("canvas");
  const preliminaryContext = preliminaryCanvas.getContext("2d");
  const topY = drawPdfHeader(preliminaryContext, width, padding, tableWidth);
  const height = topY + 20 + tableHeight + recommendationHeight + padding;
  canvas.width = width;
  canvas.height = height;

  const ctx = canvas.getContext("2d");
  ctx.fillStyle = colors.white;
  ctx.fillRect(0, 0, width, height);
  const tableY = drawPdfHeader(ctx, width, padding, tableWidth) + 20;

  let x = padding;
  drawCell(ctx, x, tableY, questionWidth, headerHeight, colors.greenDark);
  ctx.fillStyle = colors.white;
  ctx.font = '700 28px "PingFang TC", "Microsoft JhengHei", sans-serif';
  ctx.fillText("評估項目", x + 18, tableY + 48);
  x += questionWidth;

  drawCell(ctx, x, tableY, yesWidth, headerHeight, colors.greenDark);
  drawCenteredText(ctx, "是", x, tableY, yesWidth, headerHeight);
  x += yesWidth;

  ctx.font = '700 24px "PingFang TC", "Microsoft JhengHei", sans-serif';
  SUPPLEMENTS.forEach(name => {
    drawCell(ctx, x, tableY, supplementWidth, headerHeight, colors.greenDark);
    ctx.fillStyle = colors.white;
    drawWrappedText(ctx, name, x + 12, tableY + 31, supplementWidth - 24, 26, 2);
    x += supplementWidth;
  });

  QUESTIONS.forEach((question, qi) => {
    const y = tableY + headerHeight + qi * rowHeight;
    const checked = Boolean(answers[qi]);
    const rowFill = checked ? colors.greenLight : (qi % 2 === 0 ? "#ffffff" : "#fafafa");

    x = padding;
    drawCell(ctx, x, y, questionWidth, rowHeight, rowFill);
    ctx.fillStyle = colors.text;
    ctx.font = '24px "PingFang TC", "Microsoft JhengHei", sans-serif';
    drawWrappedText(ctx, question.text, x + 16, y + 24, questionWidth - 26, 23, 2);
    x += questionWidth;

    drawCell(ctx, x, y, yesWidth, rowHeight, rowFill);
    drawCheckBox(ctx, x, y, checked);
    x += yesWidth;

    SUPPLEMENTS.forEach((_, si) => {
      const scoredCell = isScoredCell(qi, si);
      const fill = scoredCell && checked ? colors.hit : (scoredCell ? rowFill : colors.gray);
      drawCell(ctx, x, y, supplementWidth, rowHeight, fill);
      x += supplementWidth;
    });
  });

  const totalY = tableY + headerHeight + QUESTIONS.length * rowHeight;
  x = padding;
  drawCell(ctx, x, totalY, questionWidth + yesWidth, totalHeight, colors.greenBand);
  ctx.fillStyle = colors.greenDark;
  ctx.font = '700 26px "PingFang TC", "Microsoft JhengHei", sans-serif';
  ctx.fillText("總計（單項超過 7 建議加重補充）", x + 190, totalY + 38);
  x += questionWidth + yesWidth;

  ctx.font = '700 28px "PingFang TC", "Microsoft JhengHei", sans-serif';
  totals.forEach(total => {
    drawCell(ctx, x, totalY, supplementWidth, totalHeight, total > 7 ? colors.warn : colors.greenBand);
    ctx.fillStyle = total > 7 ? colors.white : colors.text;
    drawCenteredText(ctx, String(total), x, totalY, supplementWidth, totalHeight);
    x += supplementWidth;
  });

  const recommendationY = totalY + totalHeight + 34;
  ctx.fillStyle = colors.greenDark;
  ctx.font = '700 32px "PingFang TC", "Microsoft JhengHei", sans-serif';
  ctx.fillText("建議補充", padding, recommendationY);
  ctx.fillStyle = "#78909c";
  ctx.font = '23px "PingFang TC", "Microsoft JhengHei", sans-serif';
  ctx.fillText("若單項營養數值超過七以上，建議加重補充。", padding, recommendationY + 38);

  if (activeTotals.length === 0) {
    ctx.fillStyle = "#90a4ae";
    ctx.fillText("尚未勾選任何項目", padding, recommendationY + 82);
    return canvas;
  }

  const badgeWidth = 405;
  const badgeHeight = 36;
  activeTotals.forEach((item, index) => {
    const col = index % 4;
    const row = Math.floor(index / 4);
    const badgeX = padding + col * (badgeWidth + 18);
    const badgeY = recommendationY + 62 + row * 48;
    const isOver = item.score > 7;
    ctx.fillStyle = isOver ? colors.warn : colors.greenLight;
    ctx.strokeStyle = isOver ? colors.warn : colors.greenDark;
    ctx.lineWidth = 2;
    ctx.fillRect(badgeX, badgeY, badgeWidth, badgeHeight);
    ctx.strokeRect(badgeX, badgeY, badgeWidth, badgeHeight);
    ctx.fillStyle = isOver ? colors.white : colors.greenDark;
    ctx.font = '700 22px "PingFang TC", "Microsoft JhengHei", sans-serif';
    ctx.fillText(`${item.name}：${item.score} 分${isOver ? "（建議加重補充）" : ""}`, badgeX + 14, badgeY + 25);
  });

  return canvas;
}

function canvasToJpegBytes(canvas, quality = 0.92) {
  return new Promise((resolve, reject) => {
    canvas.toBlob(async blob => {
      if (!blob) {
        reject(new Error("無法建立 PDF 圖像"));
        return;
      }
      resolve(new Uint8Array(await blob.arrayBuffer()));
    }, "image/jpeg", quality);
  });
}

function appendPdfString(chunks, state, text) {
  const bytes = new TextEncoder().encode(text);
  chunks.push(bytes);
  state.length += bytes.length;
}

function appendPdfBytes(chunks, state, bytes) {
  chunks.push(bytes);
  state.length += bytes.length;
}

function createPdfBlob(images, pageWidth, pageHeight) {
  const chunks = [];
  const state = { length: 0 };
  const offsets = [0];
  const objectCount = 2 + images.length * 3;

  function beginObject(id) {
    offsets[id] = state.length;
    appendPdfString(chunks, state, `${id} 0 obj\n`);
  }

  function endObject() {
    appendPdfString(chunks, state, "\nendobj\n");
  }

  appendPdfString(chunks, state, "%PDF-1.4\n");

  beginObject(1);
  appendPdfString(chunks, state, "<< /Type /Catalog /Pages 2 0 R >>");
  endObject();

  beginObject(2);
  const pageRefs = images.map((_, index) => `${3 + index * 3} 0 R`).join(" ");
  appendPdfString(chunks, state, `<< /Type /Pages /Kids [${pageRefs}] /Count ${images.length} >>`);
  endObject();

  images.forEach((image, index) => {
    const pageId = 3 + index * 3;
    const contentId = pageId + 1;
    const imageId = pageId + 2;
    const imageName = `Im${index + 1}`;
    const drawHeight = Math.min(pageHeight, image.pageHeight);
    const drawY = pageHeight - drawHeight;
    const stream = `q ${pageWidth} 0 0 ${drawHeight} 0 ${drawY} cm /${imageName} Do Q`;

    beginObject(pageId);
    appendPdfString(
      chunks,
      state,
      `<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${pageWidth} ${pageHeight}] /Resources << /XObject << /${imageName} ${imageId} 0 R >> >> /Contents ${contentId} 0 R >>`
    );
    endObject();

    beginObject(contentId);
    appendPdfString(chunks, state, `<< /Length ${stream.length} >>\nstream\n${stream}\nendstream`);
    endObject();

    beginObject(imageId);
    appendPdfString(
      chunks,
      state,
      `<< /Type /XObject /Subtype /Image /Width ${image.width} /Height ${image.height} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${image.bytes.length} >>\nstream\n`
    );
    appendPdfBytes(chunks, state, image.bytes);
    appendPdfString(chunks, state, "\nendstream");
    endObject();
  });

  const xrefOffset = state.length;
  appendPdfString(chunks, state, `xref\n0 ${objectCount + 1}\n`);
  appendPdfString(chunks, state, "0000000000 65535 f \n");
  for (let i = 1; i <= objectCount; i += 1) {
    appendPdfString(chunks, state, `${String(offsets[i]).padStart(10, "0")} 00000 n \n`);
  }
  appendPdfString(chunks, state, `trailer\n<< /Size ${objectCount + 1} /Root 1 0 R >>\nstartxref\n${xrefOffset}\n%%EOF`);

  return new Blob(chunks, { type: "application/pdf" });
}

async function createAssessmentPdfBlob(canvas) {
  const pageWidth = 842;
  const pageHeight = 595;
  const pageScale = pageWidth / canvas.width;
  const sliceHeight = Math.floor(pageHeight / pageScale);
  const images = [];

  for (let y = 0; y < canvas.height; y += sliceHeight) {
    const height = Math.min(sliceHeight, canvas.height - y);
    const pageCanvas = document.createElement("canvas");
    pageCanvas.width = canvas.width;
    pageCanvas.height = height;
    const pageContext = pageCanvas.getContext("2d");
    pageContext.fillStyle = "#ffffff";
    pageContext.fillRect(0, 0, pageCanvas.width, pageCanvas.height);
    pageContext.drawImage(canvas, 0, y, canvas.width, height, 0, 0, canvas.width, height);

    images.push({
      bytes: await canvasToJpegBytes(pageCanvas),
      width: pageCanvas.width,
      height: pageCanvas.height,
      pageHeight: height * pageScale
    });
  }

  return createPdfBlob(images, pageWidth, pageHeight);
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = filename;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  window.setTimeout(() => URL.revokeObjectURL(url), 1000);
}

async function saveAsPdf() {
  const button = document.getElementById("btn-save-pdf");
  button.disabled = true;
  setSubmitStatus("PDF 產生中...");

  try {
    const canvas = createAssessmentPdfCanvas();
    const pdfBlob = await createAssessmentPdfBlob(canvas);
    downloadBlob(pdfBlob, `${getPdfTitle()}.pdf`);
    setSubmitStatus("PDF 已下載。", "success");
  } catch (error) {
    console.error("產生 PDF 失敗", error);
    setSubmitStatus("PDF 產生失敗，請稍後再試。", "error");
  } finally {
    button.disabled = false;
  }
}

function setAssessmentLocked(locked) {
  assessmentLocked = locked;
  ["name", "age", "date"].forEach(id => {
    document.getElementById(id).disabled = locked;
  });
  document.querySelectorAll("tbody input[type=checkbox]").forEach(cb => {
    cb.disabled = locked;
  });
  document.getElementById("btn-reset-answers").disabled = locked;
  document.getElementById("btn-submit").classList.toggle("hidden", locked);
  document.getElementById("btn-new-assessment").classList.toggle("hidden", !locked);
}

function validateRequiredFields() {
  const requiredFields = [
    { id: "name", label: "姓名" },
    { id: "age", label: "年齡" }
  ];

  const missing = requiredFields.filter(field => {
    const input = document.getElementById(field.id);
    return input.value.trim() === "";
  });

  requiredFields.forEach(field => {
    const input = document.getElementById(field.id);
    input.classList.toggle("invalid", input.value.trim() === "");
  });

  if (missing.length > 0) {
    const firstInput = document.getElementById(missing[0].id);
    firstInput.focus();
    setSubmitStatus(`請填寫${missing.map(field => field.label).join("、")}。`, "error");
    return false;
  }

  return true;
}

function getRecordEndpoint(id) {
  return `${API_ENDPOINT.replace(/\/$/, "")}/${encodeURIComponent(id)}`;
}

function getNameSearchEndpoint(name) {
  return `${API_ENDPOINT.replace(/\/$/, "")}?name=${encodeURIComponent(name)}`;
}

function getShareUrl(id) {
  const url = new URL(window.location.href);
  url.searchParams.set("id", id);
  return url.toString();
}

function updateBrowserRecordId(id) {
  const url = new URL(window.location.href);
  if (id) {
    url.searchParams.set("id", id);
  } else {
    url.searchParams.delete("id");
  }
  window.history.replaceState({}, "", url);
}

function setActiveRecordId(id, updateUrl = true) {
  const normalizedId = id || "";
  document.getElementById("record-id").value = normalizedId;
  document.getElementById("btn-share").disabled = normalizedId === "";
  if (updateUrl) updateBrowserRecordId(normalizedId);
}

async function copyText(text) {
  if (navigator.clipboard && window.isSecureContext) {
    await navigator.clipboard.writeText(text);
    return;
  }

  const textarea = document.createElement("textarea");
  textarea.value = text;
  textarea.setAttribute("readonly", "");
  textarea.style.position = "fixed";
  textarea.style.left = "-9999px";
  document.body.appendChild(textarea);
  textarea.select();
  document.execCommand("copy");
  document.body.removeChild(textarea);
}

async function fetchRecordById(id) {
  const response = await fetch(getRecordEndpoint(id));

  if (!response.ok) {
    throw new Error(`HTTP ${response.status}`);
  }

  return response.json();
}

function clearElement(element) {
  while (element.firstChild) element.removeChild(element.firstChild);
}

function formatValue(value, fallback = "未填") {
  if (value === null || value === undefined || value === "") return fallback;
  return String(value);
}

function formatDateTime(value) {
  if (!value) return "未提供";
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return String(value);
  return date.toLocaleString("zh-TW", { hour12: false });
}

function addMetaRow(parent, label, value) {
  const row = document.createElement("div");
  const labelEl = document.createElement("b");
  labelEl.textContent = `${label}：`;
  row.appendChild(labelEl);
  row.append(document.createTextNode(formatValue(value)));
  parent.appendChild(row);
}

function renderRecordBadges(parent, data) {
  const badges = document.createElement("div");
  badges.className = "badges";

  const recommendations = Array.isArray(data.recommendations) ? data.recommendations : [];
  const totals = Array.isArray(data.totals) ? data.totals : [];
  const items = recommendations.length > 0
    ? recommendations
    : totals
        .filter(item => Number(item.score) > 0)
        .sort((a, b) => Number(b.score) - Number(a.score));

  if (items.length === 0) {
    const empty = document.createElement("span");
    empty.className = "empty";
    empty.textContent = "後端回傳資料未列出建議補充";
    badges.appendChild(empty);
    parent.appendChild(badges);
    return;
  }

  items.forEach(item => {
    const score = Number(item.score) || 0;
    const span = document.createElement("span");
    span.className = "badge" + (score > 7 ? " over" : "");
    span.textContent = `${formatValue(item.supplement, "未命名")}：${score} 分` + (score > 7 ? "（建議加重補充）" : "");
    badges.appendChild(span);
  });

  parent.appendChild(badges);
}

function syncAnswerControls() {
  document.querySelectorAll("#assessment tbody tr").forEach((tr, qi) => {
    const checked = Boolean(answers[qi]);
    const checkbox = tr.querySelector("input[type=checkbox]");
    if (checkbox) checkbox.checked = checked;
    tr.classList.toggle("checked-row", checked);
  });
  render();
}

function isSavedAnswerChecked(value) {
  return value === true || value === "true" || value === 1 || value === "1";
}

function applyRecordToAssessment(record) {
  const data = record.data || {};
  const respondent = data.respondent || {};
  const savedAnswers = Array.isArray(data.answers) ? data.answers : [];

  document.getElementById("name").value = respondent.name || "";
  document.getElementById("age").value = respondent.age === null || respondent.age === undefined ? "" : String(respondent.age);
  document.getElementById("date").value = respondent.date || "";

  answers = QUESTIONS.map((_, qi) => {
    const savedAnswer = savedAnswers.find((answer, index) => {
      if (!answer) return false;
      const questionId = Number(answer.questionId);
      return Number.isInteger(questionId) ? questionId === qi + 1 : index === qi;
    });
    return savedAnswer ? isSavedAnswerChecked(savedAnswer.checked) : false;
  });

  syncAnswerControls();
  setAssessmentLocked(true);
}

function displayBackendRecord(record) {
  const output = document.getElementById("record-output");
  clearElement(output);

  if (!record || !record.id) {
    const empty = document.createElement("span");
    empty.className = "empty";
    empty.textContent = "尚無紀錄";
    output.appendChild(empty);
    return;
  }

  const data = record.data || {};
  const respondent = data.respondent || {};
  const meta = document.createElement("div");
  meta.className = "record-meta";

  addMetaRow(meta, "紀錄 ID", record.id);
  addMetaRow(meta, "建立時間", formatDateTime(record.createdAt));
  addMetaRow(meta, "姓名", respondent.name);
  addMetaRow(meta, "年齡", respondent.age);
  addMetaRow(meta, "填表日期", respondent.date);

  applyRecordToAssessment(record);
  output.appendChild(meta);
  renderRecordBadges(output, data);
}

function resetBackendRecordDisplay() {
  const output = document.getElementById("record-output");
  clearElement(output);
  const empty = document.createElement("span");
  empty.className = "empty";
  empty.textContent = "尚無紀錄";
  output.appendChild(empty);
}

function startNewAssessment() {
  setAssessmentLocked(false);
  answers = QUESTIONS.map(() => false);

  document.getElementById("name").value = "";
  document.getElementById("age").value = "";
  document.getElementById("date").valueAsDate = new Date();
  setActiveRecordId("");
  document.getElementById("search-name").value = "";

  document.querySelectorAll(".meta input.invalid").forEach(input => input.classList.remove("invalid"));

  resetBackendRecordDisplay();
  setSubmitStatus("已開始填寫新評估。", "success");
  syncAnswerControls();
  document.getElementById("name").focus();
}

function displaySearchResults(result) {
  const output = document.getElementById("record-output");
  clearElement(output);

  const records = Array.isArray(result.records) ? result.records : [];
  if (records.length === 0) {
    const empty = document.createElement("span");
    empty.className = "empty";
    empty.textContent = "查無符合姓名的紀錄";
    output.appendChild(empty);
    return;
  }

  if (records.length === 1) {
    setActiveRecordId(records[0].id || "");
    displayBackendRecord(records[0]);
    return;
  }

  const meta = document.createElement("div");
  meta.className = "record-meta";
  addMetaRow(meta, "查詢姓名", result.query);
  addMetaRow(meta, "符合筆數", records.length);
  output.appendChild(meta);

  const list = document.createElement("div");
  list.className = "record-list";
  records.forEach(record => {
    const data = record.data || {};
    const respondent = data.respondent || {};
    const button = document.createElement("button");
    button.type = "button";

    const title = document.createElement("span");
    title.textContent = `${formatValue(respondent.name, "未填姓名")} · ${formatValue(respondent.date, "未填日期")}`;
    const detail = document.createElement("small");
    detail.textContent = `ID：${record.id} · 建立時間：${formatDateTime(record.createdAt)}`;

    button.appendChild(title);
    button.appendChild(detail);
    button.addEventListener("click", () => {
      setActiveRecordId(record.id || "");
      displayBackendRecord(record);
      setSubmitStatus("已載入紀錄。", "success");
    });
    list.appendChild(button);
  });
  output.appendChild(list);
}

function build() {
  const theadRow = document.querySelector("#assessment thead tr");
  SUPPLEMENTS.forEach(name => {
    const th = document.createElement("th");
    th.className = "supp";
    th.textContent = name;
    theadRow.appendChild(th);
  });

  const tbody = document.querySelector("#assessment tbody");
  QUESTIONS.forEach((q, qi) => {
    const tr = document.createElement("tr");

    const tdQ = document.createElement("td");
    tdQ.className = "q-cell";
    tdQ.textContent = q.text;
    tr.appendChild(tdQ);

    const tdYes = document.createElement("td");
    tdYes.className = "yes-cell";
    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.addEventListener("change", () => {
      answers[qi] = cb.checked;
      tr.classList.toggle("checked-row", cb.checked);
      render();
    });
    tdYes.appendChild(cb);
    tr.appendChild(tdYes);

    SUPPLEMENTS.forEach((_, si) => {
      const td = document.createElement("td");
      td.className = "grid-cell";
      td.dataset.q = qi;
      td.dataset.s = si;
      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });

  const tfootRow = document.querySelector("#assessment tfoot tr");
  SUPPLEMENTS.forEach((_, si) => {
    const td = document.createElement("td");
    td.className = "col-total";
    td.id = "total-" + si;
    td.textContent = "0";
    tfootRow.appendChild(td);
  });
  document.getElementById("submit-cell").colSpan = SUPPLEMENTS.length + 2;
}

function render() {
  document.querySelectorAll("td.grid-cell").forEach(td => {
    const qi = +td.dataset.q, si = +td.dataset.s;
    const isGrayCell = mapping[qi].includes(si);
    const isHitCell = !isGrayCell && answers[qi];
    td.classList.toggle("mapped", isGrayCell);
    td.classList.toggle("hit", isHitCell);
  });

  const totals = calculateTotals();

  totals.forEach((t, si) => {
    const td = document.getElementById("total-" + si);
    td.textContent = t;
    td.classList.toggle("over", t > 7);
  });

  const badges = document.getElementById("badges");
  badges.innerHTML = "";
  const active = totals
    .map((t, si) => ({ name: SUPPLEMENTS[si], t }))
    .filter(x => x.t > 0)
    .sort((a, b) => b.t - a.t);

  if (active.length === 0) {
    badges.innerHTML = '<span class="empty">尚未勾選任何項目</span>';
    return;
  }
  active.forEach(x => {
    const span = document.createElement("span");
    span.className = "badge" + (x.t > 7 ? " over" : "");
    span.textContent = `${x.name}：${x.t} 分` + (x.t > 7 ? "（建議加重補充）" : "");
    badges.appendChild(span);
  });
}

document.getElementById("btn-reset-answers").addEventListener("click", () => {
  if (assessmentLocked) return;
  answers = QUESTIONS.map(() => false);
  document.querySelectorAll("tbody input[type=checkbox]").forEach(cb => cb.checked = false);
  document.querySelectorAll("tbody tr").forEach(tr => tr.classList.remove("checked-row"));
  render();
});

["name", "age"].forEach(id => {
  document.getElementById(id).addEventListener("input", e => {
    e.currentTarget.classList.toggle("invalid", e.currentTarget.value.trim() === "");
  });
});

document.getElementById("btn-submit").addEventListener("click", async e => {
  const button = e.currentTarget;
  if (assessmentLocked) return;
  if (!validateRequiredFields()) return;

  const payload = buildPayload();

  button.disabled = true;
  setSubmitStatus("送出中...");

  try {
    const response = await fetch(API_ENDPOINT, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    if (!response.ok) {
      throw new Error(`HTTP ${response.status}`);
    }

    const savedRecord = await response.json();
    setActiveRecordId(savedRecord.id || "");
    document.getElementById("search-name").value = payload.respondent.name || "";
    displayBackendRecord(savedRecord);
    setAssessmentLocked(true);
    setSubmitStatus(`已送出資料。紀錄 ID：${savedRecord.id}`, "success");
  } catch (error) {
    console.error("送出營養評估資料失敗", error, payload);
    setSubmitStatus("送出失敗，請確認後端 API 或網路狀態。", "error");
  } finally {
    button.disabled = false;
  }
});

document.getElementById("btn-new-assessment").addEventListener("click", startNewAssessment);

document.getElementById("btn-save-pdf").addEventListener("click", saveAsPdf);

document.getElementById("btn-share").addEventListener("click", async () => {
  const id = document.getElementById("record-id").value.trim();

  if (!id) {
    setSubmitStatus("目前沒有可分享的紀錄 ID。", "error");
    alert("目前沒有可分享的紀錄 ID。");
    return;
  }

  const shareUrl = getShareUrl(id);

  try {
    await copyText(shareUrl);
    setSubmitStatus("分享網址已複製。", "success");
    alert(`分享網址已複製。\n\n${shareUrl}`);
  } catch (error) {
    console.error("複製分享網址失敗", error);
    setSubmitStatus("複製失敗，請手動複製瀏覽器網址。", "error");
    window.prompt("複製失敗，請手動複製分享網址：", shareUrl);
  }
});

document.getElementById("btn-fetch").addEventListener("click", async e => {
  const button = e.currentTarget;
  const id = document.getElementById("record-id").value.trim();

  if (!id) {
    setSubmitStatus("請先輸入紀錄 ID。", "error");
    return;
  }

  button.disabled = true;
  setSubmitStatus("查詢中...");

  try {
    const savedRecord = await fetchRecordById(id);
    setActiveRecordId(savedRecord.id || id);
    displayBackendRecord(savedRecord);
    setSubmitStatus("已取得紀錄。", "success");
  } catch (error) {
    console.error("查詢營養評估資料失敗", error);
    setSubmitStatus("查詢失敗，請確認紀錄 ID 或後端 API。", "error");
  } finally {
    button.disabled = false;
  }
});

document.getElementById("btn-search-name").addEventListener("click", async e => {
  const button = e.currentTarget;
  const name = document.getElementById("search-name").value.trim();

  if (!name) {
    setSubmitStatus("請先輸入姓名。", "error");
    return;
  }

  button.disabled = true;
  setSubmitStatus("姓名查詢中...");

  try {
    const response = await fetch(getNameSearchEndpoint(name));

    if (!response.ok) {
      throw new Error(`HTTP ${response.status}`);
    }

    const result = await response.json();
    displaySearchResults(result);
    setSubmitStatus(`姓名查詢完成，共 ${result.count || 0} 筆。`, "success");
  } catch (error) {
    console.error("用姓名查詢營養評估資料失敗", error);
    setSubmitStatus("姓名查詢失敗，請確認姓名或後端 API。", "error");
  } finally {
    button.disabled = false;
  }
});

document.getElementById("date").valueAsDate = new Date();

build();
render();

const initialRecordId = new URLSearchParams(window.location.search).get("id");
if (initialRecordId) {
  setActiveRecordId(initialRecordId, false);
  setSubmitStatus("正在載入分享紀錄...");
  fetchRecordById(initialRecordId)
    .then(record => {
      setActiveRecordId(record.id || initialRecordId, false);
      displayBackendRecord(record);
      setSubmitStatus("已載入分享紀錄。", "success");
    })
    .catch(error => {
      console.error("載入分享紀錄失敗", error);
      setSubmitStatus("載入分享紀錄失敗，請確認網址或後端 API。", "error");
    });
}
</script>
</body>
